name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Change par master si ta branche principale s'appelle master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install, logo, and build your site
        uses: withastro/action@v3
        with:
          path: . # Emplacement de ton projet Astro dans le dépôt

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
